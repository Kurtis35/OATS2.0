<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/oats_logos.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Overberg Airport Transfers - Premium Transportation Services</title>
    <meta name="description" content="Professional airport transfers from Cape Town International Airport to the Overberg region. 24/7 service, experienced drivers, comfortable vehicles. Contact info@overbergtransfers.com" />
    <meta name="keywords" content="airport transfers, Cape Town, Overberg, Hermanus, Grabouw, transportation, taxi, chauffeur, wine tours" />
    
    <!-- Mobile optimization meta tags -->
    <meta name="theme-color" content="#0d9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Overberg Transfers" />
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/oats_logos.jpg" as="image" />
    <link rel="preload" href="/dark_blue_photographic_conference_event_website_(4).jpg" as="image" />
  </head>
  <body>
    <!-- Hidden Netlify Forms declarations for SPA form detection -->
    <form name="wedding-rsvp" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="wedding-rsvp" />
      <input name="bot-field" />
      <input name="timestamp" />
      <input name="fullName" />
      <input name="surname" />
      <input name="email" />
      <input name="phone" />
      <input name="guestCount" />
      <input name="passengers" />
      <input name="accommodation" />
      <input name="customAccommodation" />
      <input name="shuttleChoice" />
      <input name="additionalServices" />
    </form>
    <form name="general-booking" netlify netlify-honeypot="bot-field" hidden>
      <input name="form-name" type="hidden" value="general-booking" />
      <input name="bot-field" />
      <input name="booking-method" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="pickupLocation" />
      <input name="destination" />
      <input name="date" />
      <input name="time" />
      <input name="passengers" />
      <input name="serviceType" />
      <textarea name="specialRequests"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
